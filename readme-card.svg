<svg fill="none" viewBox="0 0 720 660" width="720" height="660" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .wrap {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
          padding: 28px 32px 24px;
          width: 720px;
        }
        h1 { font-size: 32px; font-weight: 700; text-align: center; margin-bottom: 20px; }
        .cards { display: flex; justify-content: center; margin-bottom: 22px; }
        table { border-collapse: collapse; }
        td { padding: 10px 32px; text-align: center; min-width: 130px; }
        .num { font-size: 10px; font-family: monospace; display: block; margin-bottom: 2px; }
        .sym { font-size: 28px; font-weight: 700; display: block; line-height: 1.1; }
        .lname { font-size: 11px; display: block; }
        .lval  { font-size: 11px; display: block; }
        hr { border: none; margin: 0 0 20px; }
        .row { display: flex; align-items: baseline; margin-bottom: 13px; gap: 0; }
        .lbl { font-family: monospace; font-size: 13px; font-weight: 600; min-width: 148px; flex-shrink: 0; }
        .val { font-family: monospace; font-size: 13px; line-height: 1.65; }
        .footer { text-align: center; font-size: 13px; line-height: 1.8; margin-top: 18px; padding-top: 18px; }

        /* LIGHT — rich, saturated greens */
        .wrap { color: #0d1f0f; }
        h1 { color: #0d1f0f; }
        td { border: 1px solid #4a9e6b; background: #d6ede1; }
        table { border: 2px solid #1a6e3c; }
        .num { color: #2a6e42; }
        .sym { color: #145c30; }
        .lname { color: #2a6e42; }
        .lval  { color: #2a6e42; }
        hr { border-top: 1px solid #4a9e6b; }
        .lbl { color: #145c30; }
        .val { color: #0d1f0f; }
        .footer { color: #2a6e42; border-top: 1px solid #4a9e6b; }

        @media (prefers-color-scheme: dark) {
          .wrap { color: #c8ecd8; }
          h1 { color: #c8ecd8; }
          td { border: 1px solid #2a5e3c; background: #0d1f14; }
          table { border: 1.5px solid #3d8f5f; }
          .num { color: #80aa90; }
          .sym { color: #6dd496; }
          .lname { color: #80aa90; }
          .lval  { color: #80aa90; }
          hr { border-top: 1px solid #1e4a2e; }
          .lbl { color: #5dba82; }
          .val { color: #c8ecd8; }
          .footer { color: #80aa90; border-top: 1px solid #1e4a2e; }
        }
      </style>
      <div class="wrap">
        <h1>Yashna Hasija</h1>
        <div class="cards">
          <table>
            <tr>
              <td>
                <span class="num">01</span>
                <span class="sym">Em</span>
                <span class="lname">Email</span>
                <span class="lval">yashna@</span>
              </td>
              <td>
                <span class="num">02</span>
                <span class="sym">Ws</span>
                <span class="lname">Website</span>
                <span class="lval">yashna.me</span>
              </td>
              <td>
                <span class="num">03</span>
                <span class="sym">Ln</span>
                <span class="lname">LinkedIn</span>
                <span class="lval">/yashnahasija</span>
              </td>
            </tr>
          </table>
        </div>
        <hr />
        <div class="row"><span class="lbl">[about]</span><span class="val">ML researcher and builder. From DC, based in SF.</span></div>
        <div class="row"><span class="lbl">[studying]</span><span class="val">Computer Science, Chemical Biology &amp; Aerospace Engineering<br/>at UC Berkeley.</span></div>
        <div class="row"><span class="lbl">[currently]</span><span class="val">3D imaging &amp; tumor sensing hardware at The Anwar Lab.<br/>Incoming research intern at Microsoft Research this summer.</span></div>
        <div class="row"><span class="lbl">[previously]</span><span class="val">ML &amp; Data Intern at Accenture's AI Refinery.<br/>Deep Learning researcher at UCSF.</span></div>
        <div class="row"><span class="lbl">[interested in]</span><span class="val">spacetech, reinforcement learning, proteomics, wearables,<br/>drug design, computer vision, agentic systems,<br/>movies on the silver screen.</span></div>
        <div class="row"><span class="lbl">[favorites]</span><span class="val">Whiplash · 85% dark chocolate · Bismuth · Megaminx</span></div>
        <div class="row"><span class="lbl">[elsewhere]</span><span class="val">Most work is private. More at yashna.me — or just reach out.</span></div>
        <div class="footer">
          Always up for meeting new people and talking about interesting ideas.<br/>
          I'm chronically online — say hi anytime.
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
